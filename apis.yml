aid: clarifai
name: Clarifai
description: >
  Clarifai is an AI computer vision and NLP platform providing REST and gRPC APIs for image recognition,
  object detection, text analysis, visual search, and custom model training. The platform enables teams
  to build, deploy, and manage AI across shared cloud, on-premise, and edge infrastructure with support
  for model inference, workflow orchestration, vector search, and dataset management.
