    name: Clarifai API
    description: >
      The Clarifai API provides REST and gRPC endpoints for AI-powered computer vision and NLP capabilities
      including image recognition, object detection, text classification, visual search, and custom model
      training and deployment. Authentication uses Personal Access Tokens (PAT).
